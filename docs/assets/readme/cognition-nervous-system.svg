    <text class="label" x="120" y="450">Memory Plexus</text>
    <text class="small" x="120" y="477">turn experience into reusable context</text>
    <rect class="chip" x="120" y="498" width="76" height="28" rx="14"/><text class="chipText" x="158" y="517" text-anchor="middle">recorder</text>
    <rect class="chip" x="206" y="498" width="112" height="28" rx="14"/><text class="chipText" x="262" y="517" text-anchor="middle">consolidation</text>
    <rect class="chip" x="328" y="498" width="58" height="28" rx="14"/><text class="chipText" x="357" y="517" text-anchor="middle">curate</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect class="card" x="1036" y="150" width="304" height="150" rx="24"/>
    <text class="label" x="1076" y="195">Action Pathways</text>
    <text class="small" x="1076" y="222">route work into tools and workers</text>
    <rect class="chip" x="1076" y="243" width="54" height="28" rx="14"/><text class="chipText" x="1103" y="262" text-anchor="middle">loop</text>
    <rect class="chip" x="1140" y="243" width="96" height="28" rx="14"/><text class="chipText" x="1188" y="262" text-anchor="middle">delegation</text>
    <rect class="chip" x="1246" y="243" width="72" height="28" rx="14"/><text class="chipText" x="1282" y="262" text-anchor="middle">skills</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect class="card" x="1015" y="406" width="320" height="146" rx="24"/>
    <text class="label" x="1055" y="451">Self-Regulation</text>
    <text class="small" x="1055" y="478">review, recover, and adapt safely</text>
    <rect class="chip" x="1055" y="499" width="86" height="28" rx="14"/><text class="chipText" x="1098" y="518" text-anchor="middle">reflection</text>
    <rect class="chip" x="1151" y="499" width="94" height="28" rx="14"/><text class="chipText" x="1198" y="518" text-anchor="middle">recovery</text>
    <rect class="chip" x="1255" y="499" width="58" height="28" rx="14"/><text class="chipText" x="1284" y="518" text-anchor="middle">review</text>
  </g>

  <g filter="url(#cardShadow)">
