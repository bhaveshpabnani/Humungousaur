  <circle cx="700" cy="150" r="8" fill="#246BFE"/>
  <circle cx="372" cy="220" r="8" fill="#D63D36"/>
  <circle cx="406" cy="480" r="8" fill="#7C3AED"/>
  <circle cx="1036" cy="222" r="8" fill="#10A37F"/>
  <circle cx="1015" cy="480" r="8" fill="#F59E0B"/>
  <circle cx="700" cy="540" r="8" fill="#246BFE"/>
