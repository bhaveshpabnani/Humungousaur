<svg width="1400" height="650" viewBox="0 0 1400 650" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Humungousaur cognitive nervous system</title>
  <desc id="desc">A brain-and-nervous-system style map of the real Humungousaur cognition package capabilities.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="650" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7F3"/>
      <stop offset="0.42" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EDFDF8"/>
    </linearGradient>
    <linearGradient id="nerve" x1="103" y1="120" x2="1295" y2="570" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D63D36"/>
      <stop offset="0.36" stop-color="#246BFE"/>
      <stop offset="0.7" stop-color="#10A37F"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <radialGradient id="brainGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(700 330) rotate(90) scale(230 310)">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.55" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#E0F2FE"/>
    </radialGradient>
    <filter id="cardShadow" x="-20%" y="-25%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <filter id="brainShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="26" stdDeviation="28" flood-color="#0F172A" flood-opacity="0.16"/>
    </filter>
    <style>
      .card { fill: #FFFFFF; stroke: rgba(226,232,240,0.88); stroke-width: 1; }
      .label { fill: #111827; font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 24px; font-weight: 820; }
      .small { fill: #536783; font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 16px; font-weight: 560; }
      .chip { fill: #F8FAFC; stroke: #E2E8F0; stroke-width: 1; }
      .chipText { fill: #334155; font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; font-weight: 700; }
      .nerve { stroke: url(#nerve); stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; opacity: 0.78; }
      .nerveThin { stroke: url(#nerve); stroke-width: 2.5; stroke-linecap: round; stroke-dasharray: 1 12; opacity: 0.46; }
      .brainLine { stroke: #64748B; stroke-width: 3; stroke-linecap: round; opacity: 0.58; }
    </style>
  </defs>

  <rect width="1400" height="650" rx="40" fill="url(#bg)"/>
  <circle cx="196" cy="112" r="150" fill="#D63D36" opacity="0.08"/>
  <circle cx="1170" cy="132" r="190" fill="#10A37F" opacity="0.08"/>
  <circle cx="702" cy="590" r="180" fill="#246BFE" opacity="0.06"/>

