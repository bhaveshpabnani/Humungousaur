    <path class="brainLine" d="M796 326C771 316 749 327 734 352"/>
    <path class="brainLine" d="M762 397C740 380 716 386 704 414"/>
    <circle cx="700" cy="326" r="42" fill="#111827"/>
    <text x="700" y="319" text-anchor="middle" fill="#FFFFFF" font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="850">COGNITION</text>
    <text x="700" y="340" text-anchor="middle" fill="#CBD5E1" font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="700">CORE</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect class="card" x="500" y="52" width="400" height="98" rx="24"/>
    <text class="label" x="700" y="91" text-anchor="middle">Executive Cortex</text>
    <text class="small" x="700" y="119" text-anchor="middle">goals, commitments, priority, briefing</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect class="card" x="72" y="154" width="300" height="132" rx="24"/>
    <text class="label" x="112" y="199">Attention Nerves</text>
    <text class="small" x="112" y="226">decide what deserves response</text>
    <rect class="chip" x="112" y="246" width="62" height="28" rx="14"/><text class="chipText" x="143" y="265" text-anchor="middle">focus</text>
    <rect class="chip" x="184" y="246" width="74" height="28" rx="14"/><text class="chipText" x="221" y="265" text-anchor="middle">triggers</text>
    <rect class="chip" x="268" y="246" width="82" height="28" rx="14"/><text class="chipText" x="309" y="265" text-anchor="middle">queue</text>
  </g>

  <g filter="url(#cardShadow)">
