<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Humungousaur Browser Collector</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main>
      <h1>Humungousaur Browser Collector</h1>
      <label>
        <span>Browser</span>
        <select id="browser">
          <option value="chrome">Chrome</option>
          <option value="edge">Edge</option>
          <option value="brave">Brave</option>
          <option value="firefox">Firefox</option>
          <option value="safari">Safari</option>
        </select>
      </label>
      <label>
        <span>Collector endpoint</span>
        <input id="endpoint" type="url" spellcheck="false">
      </label>
      <label class="row">
        <input id="enabled" type="checkbox">
        <span>Enabled</span>
      </label>
      <button id="save" type="button">Save</button>
      <button id="health" type="button">Send health check</button>
      <p id="status" role="status"></p>
    </main>
    <script src="options.js"></script>
  </body>
</html>
